spring.application.name=dkb-health-dashboard

# Port 8080 is in use by another local service on this machine; default to 8090.
# Overridable via SERVER_PORT env var or --server.port=... argument.
server.port=${SERVER_PORT:8090}

# --- External API tolerance ---
# Snipe-IT returns many fields we don't map; don't fail deserialization on them.
spring.jackson.deserialization.fail-on-unknown-properties=false

# --- Persistence (health history) ---
# File-based H2 so uptime/event history survives restarts. Swappable for Postgres later.
spring.datasource.url=${JDBC_URL:jdbc:h2:file:./data/dkbhealth}
spring.jpa.hibernate.ddl-auto=update
dkb.history.retention-days=30

# --- Snipe-IT (asset management) ---
# Secrets come from the environment; never commit real tokens.
# Set SNIPEIT_BASE_URL (no /api/v1 suffix) and SNIPEIT_API_TOKEN in your run config / shell.
dkb.snipeit.base-url=${SNIPEIT_BASE_URL:http://localhost:8081}
dkb.snipeit.api-token=${SNIPEIT_API_TOKEN:}
dkb.snipeit.hardware-page-limit=500

# --- Odoo (CRM) ---
# JSON-2 API (POST /json/2/<model>/<method>); api key sent as a Bearer token.
# Set base-url WITHOUT the /json/2 suffix, via the ODOO_BASE_URL env var.
dkb.odoo.base-url=${ODOO_BASE_URL:http://localhost:8069}
dkb.odoo.api-key=${ODOO_API_KEY:}
dkb.odoo.recent-activity-days=7

# --- Polling / cache ---
# How often the scheduler refreshes the cached health snapshot (ms), and how long
# after startup the first poll runs.
dkb.polling.interval-ms=60000
dkb.polling.initial-delay-ms=5000

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
